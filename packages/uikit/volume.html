<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>@niivue/uikit - Ruler over a volume</title>
    <style>
      html, body { margin: 0; height: 100%; background: #111; color: #eee;
        font: 14px/1.4 system-ui, sans-serif; }
      #wrap { position: fixed; inset: 0; display: flex; flex-direction: column; }
      header { padding: 8px 12px; background: #1b1b1b; border-bottom: 1px solid #333;
        display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
      header b { color: #ffd500; }
      nav a { color: #9cf; margin-right: 10px; }
      #canvasHolder { flex: 1; position: relative; }
      canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
      a { color: #ffd500; }
      #status { color: #ffd500; }
    </style>
  </head>
  <body>
    <div id="wrap">
      <header>
        <b>UIKit ruler / volume</b>
        <nav><a href="/index.html">blank</a><a href="/volume.html">volume</a><a href="/slide.html">slide</a></nav>
        <span>Click a point, move, click again to measure.
          <a href="?backend=webgl2">webgl2</a> | <a href="?backend=webgpu">webgpu</a></span>
        <span id="status">click point A...</span>
      </header>
      <div id="canvasHolder"><canvas id="gl"></canvas></div>
    </div>

    <script type="module">
      import NiiVue, { SLICE_TYPE } from '@niivue/niivue'
      import { loadDefaultFont, UIKitRulerOverlay } from './src/index.ts'

      const params = new URLSearchParams(location.search)
      const backend = params.get('backend') === 'webgpu' ? 'webgpu' : 'webgl2'
      const status = document.getElementById('status')

      const nv = new NiiVue({
        backend,
        backgroundColor: [0.05, 0.05, 0.08, 1],
        sliceType: SLICE_TYPE.AXIAL,
        isColorbarVisible: false,
      })
      const canvas = document.getElementById('gl')
      await nv.attachToCanvas(canvas)
      await nv.loadVolumes([{ url: '/volumes/mni152.nii.gz', colormap: 'gray' }])

      const font = await loadDefaultFont()
      const ruler = new UIKitRulerOverlay(font)
      nv.registerOverlayRenderer(ruler)

      // Slice pointer events hand us the world (mm) coordinate + device-pixel
      // position already hit-tested against the 2D slice - exactly what the ruler
      // needs (screen geometry) and what a real measurement needs (mm distance).
      const ctx = nv.createExtensionContext()
      const COLOR = [1, 0.85, 0, 1]
      let anchor = null // { screen:[x,y], mm:[x,y,z] }

      const mmDist = (m) =>
        Math.hypot(m[0] - anchor.mm[0], m[1] - anchor.mm[1], m[2] - anchor.mm[2])

      const drawTo = (screen, mm) => {
        const length = mmDist(mm)
        ruler.setRuler({
          a: anchor.screen, b: screen, length, units: 'mm',
          sizePx: 22, showTickNumbers: true, lineColor: COLOR, textColor: COLOR,
        })
        nv.drawScene()
        return length
      }

      ctx.on('slicePointerMove', (e) => {
        const p = e.detail
        if (anchor && p.mm) {
          const d = drawTo([p.canvasX, p.canvasY], p.mm)
          status.textContent = `${d.toFixed(1)} mm (click to fix)`
        }
      })
      ctx.on('slicePointerUp', (e) => {
        const p = e.detail
        if (!p.mm) return
        if (!anchor) {
          anchor = { screen: [p.canvasX, p.canvasY], mm: p.mm }
          ruler.clear()
          nv.drawScene()
          status.textContent = 'move to measure, click to fix...'
        } else {
          const d = drawTo([p.canvasX, p.canvasY], p.mm)
          status.textContent = `${d.toFixed(1)} mm (click to start over)`
          anchor = null
        }
      })
    </script>
  </body>
</html>
