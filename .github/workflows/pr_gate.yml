name: PR Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, Typecheck, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: oven-sh/setup-bun@v2

      # Pixi provisions the Python dev env used by ipyniivue's Nx
      # targets (ruff, mypy, pytest, hatchling/python-build, jupyter).
      # Cached across runs by prefix-dev/setup-pixi.
      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          manifest-path: packages/ipyniivue/pyproject.toml
          environments: dev
          cache: true

      - run: bun install

      - name: Lint
        run: bunx nx run-many -t lint

      - name: Typecheck
        run: bunx nx run-many -t typecheck

      - name: Test
        run: bunx nx run-many -t test

      - name: Packed-consumer smoke test (niivue)
        run: bunx nx run niivue:smoke

      - name: Notebook hygiene
        run: bun .github/scripts/check-notebook-hygiene.ts

      - name: README notebook paths
        run: bun .github/scripts/check-readme-notebook-paths.ts

      - name: Coverage summary (niivue)
        if: always()
        run: bun .github/scripts/lcov-to-summary.ts packages/niivue/coverage/lcov.info --title "niivue test coverage"
