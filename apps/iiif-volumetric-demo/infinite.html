<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IIIF Volumetric Server — Infinite Desktop</title>
    <style>
      :root { --bg: #1a1a1a; --fg: #e0e0e0; --accent: #4caf50; }
      body { margin: 0; background: var(--bg); color: var(--fg); font-family: system-ui, sans-serif; overflow: hidden; }
      #container { width: 100vw; height: 100vh; display: flex; flex-direction: column; }
      #header { padding: 12px 20px; background: #252525; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 15px; }
      h1 { margin: 0; font-size: 1.1rem; font-weight: 500; }
      #nv-canvas { flex: 1; width: 100%; height: 100%; background: #000; display: block; }
      #debug-log {
        position: fixed; bottom: 20px; left: 20px; max-width: 400px; max-height: 200px;
        overflow-y: auto; background: rgba(0,0,0,0.7); font-family: monospace;
        font-size: 0.7rem; color: #8c8; padding: 8px; pointer-events: none; border-radius: 4px;
      }
      #controls {
        position: fixed; bottom: 20px; right: 20px; background: rgba(0,0,0,0.85);
        padding: 15px; border-radius: 8px; border: 1px solid #444; font-size: 0.8rem; z-index: 100;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <div id="header">
        <h1>Infinite Volumetric Desktop</h1>
        <div style="flex:1"></div>
        <a href="/" style="color:#aaa;text-decoration:none;font-size:0.8rem">Back to Slices</a>
      </div>
      <canvas id="nv-canvas"></canvas>
    </div>
    <div id="debug-log"></div>

    <div id="controls">
        <label>Navigation Mode:</label><br/>
        <select id="navMode" style="margin: 5px 0 10px 0; width: 100%">
            <option value="world">Navigate World</option>
            <option value="instance">Rotate Instance</option>
        </select>
        <br/>
        <div style="display: flex; gap: 5px; margin-bottom: 10px;">
            <button type="button" id="zoomIn" style="flex:1">+</button>
            <button type="button" id="zoomOut" style="flex:1">-</button>
            <button type="button" id="screenshot" style="flex:1">save</button>
        </div>
        <label>Colormap:</label><br/>
        <select id="colormap" style="margin-top: 5px; width: 100%">
            <option>Gray</option>
            <option>Plasma</option>
            <option>Viridis</option>
            <option>Hot</option>
        </select>
    </div>

    <script type="module" src="/src/infinite.ts"></script>
  </body>
</html>
