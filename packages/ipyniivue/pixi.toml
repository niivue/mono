[project]
name = "ipyniivue"
version = "0.0.0"
description = "Jupyter widget for NiiVue (anywidget-based)."
authors = ["niivue authors"]
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64", "osx-64", "win-64"]

[dependencies]
python = ">=3.10"
anywidget = ">=0.9"

[pypi-dependencies]
ipyniivue = { path = ".", editable = true }

[feature.dev.dependencies]
pytest = ">=7"
jupyter = ">=1"
jupyterlab = ">=4"
ipykernel = ">=6"
nbclient = ">=0.10"
nbformat = ">=5"

[feature.dev.tasks]
# Headless execution of the smoke-test notebook. Verifies Python-side
# imports, widget construction, and method calls don't raise. Does NOT
# verify the browser-side rendering — that requires a real browser.
smoke = "jupyter execute examples/01_hello_volume.ipynb"
# Open JupyterLab for manual inspection of widget rendering.
lab = "jupyter lab"

[environments]
default = { features = [], solve-group = "default" }
dev = { features = ["dev"], solve-group = "default" }

[tool.nx]
workspace-dependencies = []
