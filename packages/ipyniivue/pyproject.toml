[project]
name = "ipyniivue"
version = "0.0.0"
description = "Jupyter widget for NiiVue medical-image visualization (anywidget-based)."
requires-python = ">=3.10"
license = { text = "BSD-2-Clause" }
authors = [{ name = "niivue authors" }]
dependencies = [
  "anywidget>=0.9",
  "traitlets>=5.0",
]

[project.optional-dependencies]
dev = ["pytest>=7"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ipyniivue"]

[tool.nx]
# Workspace dependencies for the Nx graph. None today; codegen reads
# niivue source via filesystem, not via package import.
workspace-dependencies = []
