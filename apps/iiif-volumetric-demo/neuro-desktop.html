<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Neuro Infinite Desktop — IIIF Volumetric</title>
    <style>
      :root { --bg: #050505; --fg: #e0e0e0; --accent: #8ab4f8; }
      body { margin: 0; background: var(--bg); color: var(--fg); font-family: ui-sans-serif, system-ui, sans-serif; overflow: hidden; }
      #container { width: 100vw; height: 100vh; display: flex; flex-direction: column; }
      #header {
        padding: 12px 20px;
        background: #111;
        border-bottom: 1px solid #222;
        display: flex;
        align-items: center;
        gap: 20px;
        z-index: 10;
      }
      h1 { margin: 0; font-size: 1rem; font-weight: 600; color: var(--accent); letter-spacing: 0.02em; }
      #nv-canvas { flex: 1; width: 100%; height: 100%; background: #000; display: block; }
      #debug-log {
        position: fixed; bottom: 20px; left: 20px; width: 320px; max-height: 160px;
        overflow-y: auto; background: rgba(0,0,0,0.8); font-family: ui-monospace, monospace;
        font-size: 0.7rem; color: #aaa; padding: 10px; pointer-events: none; border-radius: 6px;
        border: 1px solid #333;
      }
      #controls {
        position: fixed; bottom: 20px; right: 20px; background: rgba(15,15,15,0.9);
        padding: 16px; border-radius: 8px; border: 1px solid #333; font-size: 0.8rem; z-index: 100;
        width: 200px; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      }
      label { display: block; margin-bottom: 6px; color: #888; text-transform: uppercase; font-size: 0.65rem; font-weight: 700; }
      select, button {
        width: 100%; background: #222; border: 1px solid #444; color: #fff;
        padding: 6px 8px; border-radius: 4px; margin-bottom: 12px; font-size: 0.8rem;
      }
      button:hover { background: #333; cursor: pointer; }
      .btn-group { display: flex; gap: 6px; }
      .btn-group button { margin-bottom: 0; }
      .links a { color: #666; text-decoration: none; font-size: 0.8rem; }
      .links a:hover { color: #fff; }

      #minimap-container {
        position: fixed;
        top: 80px;
        right: 20px;
        width: 150px;
        height: 150px;
        background: rgba(0,0,0,0.5);
        border: 1px solid #333;
        border-radius: 4px;
        pointer-events: auto;
        cursor: crosshair;
        z-index: 5;
      }
      #minimap-viewport {
        position: absolute;
        border: 1px solid var(--accent);
        background: rgba(138, 180, 248, 0.15);
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <div id="header">
        <h1>NEURO INFINITE DESKTOP</h1>
        <div class="links">
          <a href="/">Slices</a>
          <span style="margin: 0 8px; color: #333">|</span>
          <a href="/openneuro.html">Grid</a>
        </div>
        <div style="flex:1"></div>
        <div id="status" style="font-size:0.75rem; color:#666"></div>
      </div>
      <canvas id="nv-canvas"></canvas>
      <div id="minimap-container">
        <div id="minimap-viewport"></div>
      </div>
    </div>
    <div id="debug-log"></div>

    <div id="controls">
        <label>Navigation Mode</label>
        <select id="navMode">
            <option value="world">Pan & Zoom World</option>
            <option value="instance">Rotate Selected</option>
        </select>

        <label>Interaction</label>
        <div class="btn-group" style="margin-bottom:12px">
            <button type="button" id="zoomIn" title="Zoom In">+</button>
            <button type="button" id="zoomOut" title="Zoom Out">-</button>
            <button type="button" id="screenshot" title="Save Screenshot">save</button>
        </div>

        <label>Visualization</label>
        <select id="colormap">
            <option value="alternate">Alternating</option>
            <option value="Gray">Grayscale</option>
            <option value="plasma">Plasma</option>
            <option value="viridis">Viridis</option>
            <option value="hot">Hot</option>
            <option value="cool">Cool</option>
        </select>

        <div style="font-size: 0.65rem; color: #555; line-height: 1.4">
          Wheel to zoom, Drag to pan.<br>
          Resolution adapts as you zoom in.
        </div>
    </div>

    <script type="module" src="/src/neuro-desktop.ts"></script>
  </body>
</html>
