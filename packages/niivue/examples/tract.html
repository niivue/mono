<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>NiiVue Tracts</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/niivue.css" />
  </head>
  <body>
    <header>
      <select id="sliceType">
        <option value="4" selected>Render</option>
        <option value="3">A+C+S+R</option>
      </select>
      &nbsp;
      <label for="fileSelect">File</label>
      <select id="fileSelect">
        <option selected>tract.IFOF_R.trk</option>
        <option>tract.SLF1_R.tck</option>
        <option>dpsv.trx</option>
        <option>colby.trx</option>
      </select>
      &nbsp;
      <label for="radius">Radius</label>
      <input type="range" id="radius" min="0.1" max="3" step="0.1" value="0.5" />
      &nbsp;
      <label for="sides">Sides</label>
      <input type="range" id="sides" min="3" max="20" step="1" value="7" />
      &nbsp;
      <label for="decimation">Decimation</label>
      <input type="range" id="decimation" min="1" max="20" step="1" value="1" />
      &nbsp;
      <label for="shaderSelect">Shader</label>
      <select id="shaderSelect"></select>
      &nbsp;

      <label for="webgpuCheck">WebGPU</label>
      <input type="checkbox" id="webgpuCheck" checked/>
    </header>
    <main id="canvas-container">
      <canvas id="gl1"></canvas>
    </main>
    <script type="module">
      import { ubuntu } from '../src/assets/fonts'
      import { cortex } from '../src/assets/matcaps'
      import NiiVue from '../src/index.ts'

      sliceType.onchange = () => {
        nv1.sliceType = parseInt(sliceType.value, 10)
      }

      fileSelect.onchange = async () => {
        await nv1.loadMeshes([{ url: `/meshes/${fileSelect.value}` }])
      }
      shaderSelect.onchange = () => {
        const meshes = nv1.model.getMeshes()
        if (meshes.length < 1) return
        nv1.setMesh(meshes.length - 1, { shaderType: shaderSelect.value })
      }
      radius.oninput = async () => {
        const meshes = nv1.model.getMeshes()
        if (meshes.length < 1) return
        await nv1.setTractOptions(0, { fiberRadius: parseFloat(radius.value) })
      }

      sides.oninput = async () => {
        const meshes = nv1.model.getMeshes()
        if (meshes.length < 1) return
        await nv1.setTractOptions(0, { fiberSides: parseInt(sides.value, 10) })
      }

      decimation.oninput = async () => {
        const meshes = nv1.model.getMeshes()
        if (meshes.length < 1) return
        await nv1.setTractOptions(0, { decimation: parseInt(decimation.value, 10) })
      }

      webgpuCheck.onchange = async function () {
        await nv1.reinitializeView({ backend: this.checked ? 'webgpu' : 'webgl2' })
      }
      const nv1 = new NiiVue({ backgroundColor: [0.15, 0.15, 0.25, 1], font: ubuntu, matcaps: { cortex } })
      await nv1.attachToCanvas(gl1)
      for (const shader of nv1.meshShaders) {
      const option = document.createElement('option')
        option.value = shader
        option.textContent = shader.charAt(0).toUpperCase() + shader.slice(1)
        shaderSelect.appendChild(option)
      }
      nv1.sliceType = 4 // render
      fileSelect.onchange()
    </script>
  </body>
</html>
