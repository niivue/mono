name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (print the plan without creating commits or tags)"
        type: boolean
        default: false
      rc:
        description: "Create release candidate versions (for example, 1.2.3-rc.0) and publish them with the npm 'next' tag"
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: nx release
    runs-on: ubuntu-latest
    # workflow_dispatch can be triggered from any branch. Guard against
    # accidentally force-pushing a feature branch to main.
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          lfs: true
          # Use an admin PAT so `git push` can bypass the main ruleset
          # (repo admins are listed as bypass actors). Falls back to the
          # workflow-scoped GITHUB_TOKEN if the secret is unset.
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - run: bun install

      - name: Configure git identity
        # Uses the official github-actions[bot] noreply address (user id 41898282).
        # This attributes release commits to the bot in the GitHub UI with its avatar.
        run: bun .github/scripts/configure-release-git.ts

      - name: Release (dry run)
        if: ${{ inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: bun .github/scripts/run-typescript-release.ts --dry-run ${{ inputs.rc && '--rc' || '' }}

      - name: Release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: bun .github/scripts/run-typescript-release.ts ${{ inputs.rc && '--rc' || '' }}

      - name: Push release commit and tags
        if: ${{ !inputs.dry_run }}
        run: bun .github/scripts/push-release-commit.ts

      - name: Create GitHub Releases
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        # For each tag Nx created at HEAD, create (or update, if rerunning) a
        # matching GitHub Release whose body is the project's freshly-written
        # CHANGELOG.md top section.
        run: bun .github/scripts/create-github-releases.ts

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
        run: bun .github/scripts/publish-npm-packages.ts
