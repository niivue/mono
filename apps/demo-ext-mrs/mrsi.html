<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>NiiVue — MRSI (MR Spectroscopic Imaging)</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="src/style.css" />
  </head>
  <body>
    <header>
      <strong>MRSI</strong>
      &nbsp;
      <label for="modeSelect">Component</label>
      <select id="modeSelect">
        <option value="real" selected>Real</option>
        <option value="imag">Imaginary</option>
        <option value="magnitude">Magnitude</option>
        <option value="phase">Phase</option>
      </select>
      &nbsp;
      <label for="apod">Apodize (Hz) <span id="apodVal">0</span></label>
      <input type="range" id="apod" min="0" max="20" step="1" value="0" />
      &nbsp;
      <label for="p0">Phase0 (°) <span id="p0Val">0</span></label>
      <input type="range" id="p0" min="-180" max="180" step="1" value="0" />
      &nbsp;
      <label for="p1">Phase1 (ms) <span id="p1Val">0</span></label>
      <input type="range" id="p1" min="-5" max="5" step="0.1" value="0" />
      &nbsp;
      <label for="ppmLow">ppm low <span id="ppmLowVal">0.2</span></label>
      <input type="range" id="ppmLow" min="-2" max="10" step="0.1" value="0.2" />
      &nbsp;
      <label for="ppmHigh">ppm high <span id="ppmHighVal">4.2</span></label>
      <input type="range" id="ppmHigh" min="-2" max="10" step="0.1" value="4.2" />
      &nbsp;
      <button type="button" id="fullRangeBtn">Full range</button>
      &nbsp;
      <label for="reactiveCheck" title="Sliders drive the live view window and follow the in-graph zoom/pan (two-way). Unchecked: sliders set the explicit ppm range and zoom is transient.">Reactive</label>
      <input type="checkbox" id="reactiveCheck" />
      &nbsp;
      <label for="mapMode">Map</label>
      <select id="mapMode" title="Integrate the magnitude |spectrum| or the real part over the ppm band">
        <option value="magnitude" selected>magnitude</option>
        <option value="real">real</option>
      </select>
      <button type="button" id="makeMapBtn" title="Add a metabolite-map overlay: integrate the spectrum over the current ppm window (low-high) across every voxel. e.g. set 1.9-2.1 ppm for an NAA map.">Make map</button>
      &nbsp;
      <label for="threshold">Map threshold <span id="thresholdVal">0</span></label>
      <input type="range" id="threshold" min="0" max="100" step="1" value="0" title="Hide MRSI grid voxels below this total-signal value (e.g. residual signal outside the head)" />
      &nbsp;
      <label for="mapOpacity">Map opacity <span id="mapOpacityVal">0.8</span></label>
      <input type="range" id="mapOpacity" min="0" max="1" step="0.05" value="0.8" />
      &nbsp;
      <label for="cmapSelect">Colormap</label>
      <select id="cmapSelect" title="warm matches FSLeyes; the others are colorblind-safe">
        <option value="warm" selected>Warm</option>
        <option value="cividis">Cividis</option>
        <option value="viridis">Viridis</option>
        <option value="magma">Magma</option>
        <option value="lipari">Lipari</option>
      </select>
      &nbsp;
      <label for="colorbarCheck" title="Total signal: integral of |spectrum| over the ppm band (arbitrary units)">Colorbar</label>
      <input type="checkbox" id="colorbarCheck" />
      &nbsp;
      <label for="maskCheck" title="Restrict the MRSI overlay to in-mask (brain) voxels">Mask</label>
      <input type="checkbox" id="maskCheck" checked />
      &nbsp;
      <label for="snapCheck" title="Snap the crosshair to the MRSI voxel grid (marks the sampled cell)">Snap</label>
      <input type="checkbox" id="snapCheck" checked />
      &nbsp;
      <label for="viewSelect">View</label>
      <select id="viewSelect">
        <option value="0" selected>Axial</option>
        <option value="1">Coronal</option>
        <option value="2">Sagittal</option>
        <option value="3">A+C+S+R</option>
        <option value="4">Render</option>
      </select>
      &nbsp;
      <input type="color" id="colorBtn" value="#191923" />
      &nbsp;
      <label for="webgpuCheck">WebGPU</label>
      <input type="checkbox" id="webgpuCheck" checked />
    </header>
    <main id="canvas-container">
      <canvas id="gl1"></canvas>
    </main>
    <footer id="location">NiiVue::MRSI&nbsp;</footer>
    <script type="module" src="src/main.ts"></script>
  </body>
</html>
