[workspace]
authors = ["Taylor Hanayik <hanayik@gmail.com>"]
channels = ["conda-forge", "https://quantco.jfrog.io/artifactory/api/conda/virdx"]
name = "api-z"
platforms = ["osx-arm64"]
version = "0.1.0"

[tasks]
dev = "python main.py"
lint = "ruff check ."
format = "ruff format ."
test = "python -m pytest"

[dependencies]
python = ">=3.11"
ruff = ">=0.4"
pytest = ">=8"

# Workspace project dependencies (read by the NX Pixi plugin for the dependency graph)
[tool.nx]
workspace-dependencies = ["py-package-c"]
