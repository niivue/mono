<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>NiiVue fMRI + Physiology</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/niivue.css" />
  </head>
  <body>
    <header>
      <select id="sliceType">
        <option value="0" selected>Axial</option>
        <option value="1">Coronal</option>
        <option value="2">Sagittal</option>
        <option value="3">A+C+S+R</option>
        <!-- 5 = SLICE_TYPE.NONE: hide the slices, graph fills the canvas -->
        <option value="5">None (graph only)</option>
      </select>
      &nbsp;
      <button type="button" id="prevFrame">Back</button>
      &nbsp;
      <button type="button" id="nextFrame">Forward</button>
      &nbsp;
      <span id="frameLabel">frame 0</span>
      &nbsp;
      <button type="button" id="headerBtn">Header</button>
      &nbsp;
      <label for="fmriCheck">fMRI</label>
      <input type="checkbox" id="fmriCheck" checked />
      <label for="respCheck">Respiratory</label>
      <input type="checkbox" id="respCheck" checked />
      <label for="cardCheck">Cardiac</label>
      <input type="checkbox" id="cardCheck" checked />
      &nbsp;
      <label for="lineSize">Line</label>
      <select id="lineSize">
        <option value="0.5" selected>Thin</option>
        <option value="1">Normal</option>
        <option value="2">Thick</option>
        <option value="3">Extra</option>
      </select>
      <label for="lineOpacity">Opacity</label>
      <select id="lineOpacity">
        <option value="1" selected>100%</option>
        <option value="0.75">75%</option>
        <option value="0.5">50%</option>
        <option value="0.3">30%</option>
      </select>
      &nbsp;
      <input type="color" id="colorBtn" value="#191923" />
      &nbsp;
      <label for="webgpuCheck">WebGPU</label>
      <input type="checkbox" id="webgpuCheck" checked />
    </header>
    <main id="canvas-container">
      <canvas id="gl1"></canvas>
    </main>
    <footer id="location">NiiVue::fMRI+Physio&nbsp;</footer>
    <script type="module" src="physio.bold.js"></script>
  </body>
</html>
