<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NiiVue Sheet — 3×3 Volumes + Meshes</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0b0d10;
        color: #e8eaed;
        overflow: hidden;
      }
      header {
        padding: 8px 16px;
        border-bottom: 1px solid #222;
        display: flex;
        align-items: center;
        gap: 14px;
      }
      header h1 {
        font-size: 0.95rem;
        margin: 0;
        font-weight: 500;
      }
      header .links {
        margin-left: auto;
      }
      header .links a {
        color: #8ab4f8;
        margin-left: 12px;
        text-decoration: none;
        font-size: 0.85rem;
      }
      header .control {
        font-size: 0.8rem;
        color: #9aa0a6;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }
      header select,
      header button {
        background: #1a1d20;
        border: 1px solid #2a2d31;
        color: #e8eaed;
        padding: 3px 8px;
        border-radius: 4px;
        font-size: 0.8rem;
      }
      header button {
        cursor: pointer;
      }
      header button:hover {
        background: #2a2d31;
      }
      main {
        position: relative;
        height: calc(100vh - 41px);
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: #000;
        touch-action: none;
        outline: none;
      }
      .hud {
        position: absolute;
        bottom: 12px;
        left: 12px;
        background: rgba(0, 0, 0, 0.55);
        padding: 6px 10px;
        border-radius: 6px;
        font-family: ui-monospace, monospace;
        font-size: 0.72rem;
        color: #9aa0a6;
        pointer-events: none;
      }
      .pill {
        display: inline-block;
        font-size: 0.7rem;
        background: #1a1d20;
        border: 1px solid #2a2d31;
        padding: 1px 6px;
        border-radius: 999px;
        color: #9aa0a6;
      }
      .pill.green {
        color: #b8f5c8;
        border-color: #1a3a25;
      }
      .pill.red {
        color: #f5b8b8;
        border-color: #3a1a1a;
      }
      .minimap {
        position: absolute;
        top: 12px;
        right: 12px;
        width: 168px;
        height: 168px;
        background: #14171a;
        border: 1px solid #2a2d31;
        border-radius: 6px;
        overflow: hidden;
        user-select: none;
        touch-action: none;
        cursor: crosshair;
      }
      .minimap-grid {
        position: absolute;
        inset: 4px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(3, 1fr);
        gap: 2px;
      }
      .minimap-cell {
        background: #1f2429;
        border-radius: 2px;
      }
      .minimap-view {
        position: absolute;
        border: 1.5px solid #8ab4f8;
        background: rgba(138, 180, 248, 0.12);
        box-sizing: border-box;
        pointer-events: none;
        border-radius: 2px;
      }
      .minimap-label {
        position: absolute;
        bottom: 2px;
        left: 4px;
        font-size: 0.62rem;
        color: #5f6368;
        font-family: ui-monospace, monospace;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>NiiVue Sheet <span class="pill" id="statusPill">loading</span></h1>
      <span class="control">
        <label for="sliceType">Slice</label>
        <select id="sliceType">
          <option value="0">Axial</option>
          <option value="1">Coronal</option>
          <option value="2">Sagittal</option>
          <option value="3">A+C+S+R</option>
          <option value="4" selected>Render</option>
        </select>
      </span>
      <span class="control">
        <label for="meshSelect">Mesh</label>
        <select id="meshSelect">
          <option value="BrainMesh_ICBM152.lh.mz3" selected>BrainMesh ICBM152 (lh)</option>
          <option value="inflated.mz3">inflated</option>
          <option value="cortex_5124.mz3">cortex_5124</option>
          <option value="scalp.mz3">scalp</option>
          <option value="">(none)</option>
        </select>
      </span>
      <span class="control">
        <button type="button" id="zoomOut">−</button>
        <button type="button" id="zoomFit">fit</button>
        <button type="button" id="zoomIn">+</button>
      </span>
      <div class="links">
        <a href="/index.html">index</a>
        <a href="/meshes.html">meshes</a>
      </div>
    </header>
    <main>
      <canvas id="nv-canvas" tabindex="0" aria-label="3×3 sheet of volumes and meshes"></canvas>
      <div class="hud" id="hud">zoom 1.00× · pan 0.00, 0.00</div>
      <div class="minimap" id="minimap" aria-label="Sheet navigator">
        <div class="minimap-grid" id="minimapGrid"></div>
        <div class="minimap-view" id="minimapView"></div>
        <div class="minimap-label">click · drag · wheel</div>
      </div>
    </main>
    <script type="module" src="/src/sheet-viewer.ts"></script>
  </body>
</html>
