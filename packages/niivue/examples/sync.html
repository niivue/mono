<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>NiiVue Synchronize</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/niivue.css" />
  </head>
  <body>
    <header>
      <select id="sliceType">
        <option value="0">Axial</option>
        <option value="1">Coronal</option>
        <option value="2">Sagittal</option>
        <option value="4">Render</option>
        <option value="3" selected>A+C+S+R</option>
      </select>
      <label for="broadcastSelect"> Broadcast</label>
      <select id="broadcastSelect">
        <option value="0">Independent</option>
        <option value="1">Top Controls Bottom</option>
        <option value="2">Bottom Controls Top</option>
        <option value="3" selected>Bidirectional</option>
      </select>
      <label for="webgpuCheck">WebGPU</label>
      <input type="checkbox" id="webgpuCheck" checked/>
      <button type="button" id="aboutBtn">About</button>
    </header>
    <main id="canvas-container">
      <canvas id="gl1"></canvas>
    </main>
    <main id="canvas-container">
      <canvas id="gl2"></canvas>
    </main>
    <script type="module" src="sync.js"></script>
  </body>
</html>
