<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>NiiVue — Image Processing Extensions</title>
    <link rel="icon" href="data:,">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #222; color: #eee; font-family: system-ui, sans-serif; }
      header {
        background: #333; padding: 0.5rem 1rem; display: flex;
        align-items: center; gap: 0.75rem; flex-wrap: wrap;
      }
      header label { font-size: 0.85rem; }
      #canvas-container { width: 100%; height: calc(100vh - 80px); }
      canvas { width: 100%; height: 100%; }
      footer { background: #333; padding: 0.25rem 0.5rem; font-size: 0.8rem; }
      #status { color: #8f8; font-size: 0.85rem; }
      dialog { padding: 1em; border-radius: 8px; border: 1px solid #666; }
    </style>
  </head>
  <body>
    <header>
      <select id="sliceType">
        <option value="0">Axial</option>
        <option value="1">Coronal</option>
        <option value="2">Sagittal</option>
        <option value="4">Render</option>
        <option value="3" selected>A+C+S+R</option>
      </select>
      <label for="transformSelect">Processing:</label>
      <select id="transformSelect"></select>
      <button type="button" id="resetBtn">Reset</button>
      <span id="status"></span>
    </header>
    <main id="canvas-container">
      <canvas id="gl1"></canvas>
    </main>
    <footer id="location">&nbsp;</footer>
    <script type="module" src="src/imgproc.js"></script>
  </body>
</html>
