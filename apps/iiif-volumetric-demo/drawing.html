<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Drawing on a chunked volume — niivue</title>
  <style>
    :root {
      color-scheme: dark;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      background: #0b0c0e;
      color: #e8eaed;
      font: 13px/1.5 system-ui, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 12px;
      border-bottom: 1px solid #1f2227;
      flex: none;
    }

    header strong {
      font-weight: 600;
    }

    .links {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
    }

    .links a {
      color: #9aa0a6;
      text-decoration: none;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 12px;
      border-bottom: 1px solid #1f2227;
      flex: none;
      flex-wrap: wrap;
    }

    .controls label {
      color: #9aa0a6;
    }

    select,
    button {
      background: #16181c;
      color: #e8eaed;
      border: 1px solid #2a2d31;
      border-radius: 4px;
      padding: 3px 8px;
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    button:hover {
      border-color: #3a3d41;
    }

    input[type="range"] {
      accent-color: #8ab4f8;
      vertical-align: middle;
    }

    main {
      position: relative;
      flex: 1;
      min-height: 0;
      background: #000;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .hud {
      position: absolute;
      top: 8px;
      left: 8px;
      background: rgba(0, 0, 0, 0.6);
      padding: 6px 9px;
      border-radius: 5px;
      font-size: 11px;
      white-space: pre;
      pointer-events: none;
      max-width: 56ch;
    }

    .hint {
      position: absolute;
      bottom: 8px;
      left: 8px;
      background: rgba(0, 0, 0, 0.55);
      padding: 5px 9px;
      border-radius: 5px;
      font-size: 11px;
      color: #9aa0a6;
    }

    .fallback {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      color: #f28b82;
    }
  </style>
</head>

<body>
  <header>
    <strong>Drawing on a chunked volume</strong>
    <span class="links" data-nav-links></span>
  </header>
  <div class="controls">
    <label for="volume">volume</label>
    <select id="volume"></select>
    <label for="pen">pen</label>
    <select id="pen">
      <option value="1">red (1)</option>
      <option value="2">green (2)</option>
      <option value="3">blue (3)</option>
      <option value="0">erase (0)</option>
    </select>
    <label for="penShape">shape</label>
    <select id="penShape">
      <option value="0">rectangle (0)</option>
      <option value="1">circle (1)</option>
    </select>
    <label>size <input type="range" id="size" min="1" max="15" step="1" value="4" /></label>
    <label><input type="checkbox" id="drawOn" checked /> draw</label>
    <label><input type="checkbox" id="explode" /> explode (3D)</label>
    <button id="clear" type="button">clear</button>
    <button id="undo" type="button">undo</button>
    <span id="mag" style="color:#9aa0a6"></span>
  </div>
  <main>
    <canvas id="nv-canvas"></canvas>
    <div class="hud" id="hud">loading…</div>
    <div class="hint">2D: draw on the slices; a stroke re-uploads only the chunks it touches · explode (3D): the blocks
      separate — left-drag rotates, right-click a block to paint on it</div>
    <div class="fallback" id="fallback"></div>
  </main>
  <script type="module" src="/src/drawing.ts"></script>
</body>

</html>
