<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>NiiVue Mesh Atlas</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/niivue.css" />
  </head>
  <body>
    <header>
      <select id="sliceType">
        <option value="0">Axial</option>
        <option value="1">Coronal</option>
        <option value="2">Sagittal</option>
        <option value="4" selected>Render</option>
        <option value="3">A+C+S+R</option>
      </select>
      &nbsp;
      <label for="shaderSelect">Shader</label>
      <select id="shaderSelect"></select>
      &nbsp;
      <input type="color" id="colorBtn" value="#000002">
      &nbsp;
      <label for="legendCheck">Legend</label>
      <input type="checkbox" id="legendCheck" checked/>
      &nbsp;
      <label for="webgpuCheck">WebGPU</label>
      <input type="checkbox" id="webgpuCheck" checked/>
      &nbsp;
      <button type="button" id="aboutBtn">About</button>
    </header>
    <main id="canvas-container">
      <canvas id="gl1"></canvas>
    </main>
    <script type="module" src="mesh.atlas.js"></script>
  </body>
</html>
