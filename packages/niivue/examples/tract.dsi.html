<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>NiiVue DSI-Studio TinyTrack</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/niivue.css" />
  </head>
  <body>
    <header>
      <select id="sliceType">
        <option value="4" selected>Render</option>
        <option value="3">A+C+S+R</option>
      </select>
      &nbsp;
      <label for="fiberColor">Color:</label>
      <select id="fiberColor">
        <option value="" selected>Local direction</option>
        <option value="global">Global direction</option>
        <option value="fixed">Fixed</option>
      </select>
      &nbsp;
      <label for="radiusSlide">Radius</label>
      <input type="range" id="radiusSlide" min="0" max="20" step="1" value="5" />
      &nbsp;
      <label for="decimationSlide">Decimation</label>
      <input type="range" id="decimationSlide" min="1" max="20" step="1" value="1" />
      &nbsp;
      <label for="xrayCheck">XRay</label>
      <input type="checkbox" id="xrayCheck"/>
      &nbsp;
      <label for="webgpuCheck">WebGPU</label>
      <input type="checkbox" id="webgpuCheck" checked/>
    </header>
    <main id="canvas-container">
      <canvas id="gl1"></canvas>
    </main>
    <script type="module" src="tract.dsi.js"></script>
  </body>
</html>
