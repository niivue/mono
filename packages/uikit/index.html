<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>@niivue/uikit - Ruler demo</title>
    <style>
      html, body { margin: 0; height: 100%; background: #111; color: #eee;
        font: 14px/1.4 system-ui, sans-serif; }
      #wrap { position: fixed; inset: 0; display: flex; flex-direction: column; }
      header { padding: 8px 12px; background: #1b1b1b; border-bottom: 1px solid #333;
        display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
      header b { color: #ffd500; }
      nav a { color: #9cf; margin-right: 10px; }
      #canvasHolder { flex: 1; position: relative; }
      canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
      a { color: #ffd500; }
      kbd { background: #333; border-radius: 3px; padding: 1px 5px; }
    </style>
  </head>
  <body>
    <div id="wrap">
      <header>
        <b>UIKit ruler</b>
        <nav><a href="/index.html">blank</a><a href="/volume.html">volume</a><a href="/slide.html">slide</a></nav>
        <span>Click two points to measure. <kbd>backend</kbd>:
          <a href="?backend=webgl2">webgl2</a> | <a href="?backend=webgpu">webgpu</a></span>
        <span id="status">clicking point A...</span>
      </header>
      <div id="canvasHolder"><canvas id="gl"></canvas></div>
    </div>

    <script type="module">
      import NiiVue from '@niivue/niivue'
      import { loadDefaultFont, UIKitRulerOverlay } from './src/index.ts'

      const params = new URLSearchParams(location.search)
      const backend = params.get('backend') === 'webgpu' ? 'webgpu' : 'webgl2'
      const status = document.getElementById('status')

      const nv = new NiiVue({
        backend,
        backgroundColor: [0.06, 0.06, 0.09, 1],
        show3Dcrosshair: true,
      })
      const canvas = document.getElementById('gl')
      await nv.attachToCanvas(canvas)

      const font = await loadDefaultFont()
      const ruler = new UIKitRulerOverlay(font)
      nv.registerOverlayRenderer(ruler)

      // Client coords -> device-pixel coords in the canvas backing store.
      const toDevice = (ev) => {
        const rect = canvas.getBoundingClientRect()
        const sx = canvas.width / rect.width
        const sy = canvas.height / rect.height
        return [(ev.clientX - rect.left) * sx, (ev.clientY - rect.top) * sy]
      }

      let pointA = null
      canvas.addEventListener('click', (ev) => {
        const p = toDevice(ev)
        if (!pointA) {
          pointA = p
          ruler.clear()
          nv.drawScene()
          status.textContent = 'clicking point B...'
          return
        }
        const dx = p[0] - pointA[0]
        const dy = p[1] - pointA[1]
        const lengthPx = Math.hypot(dx, dy)
        // Fake scale: 1 unit per 20 device px, just to exercise ticks + label.
        const length = lengthPx / 20
        ruler.setRuler({
          a: pointA,
          b: p,
          length,
          units: 'u',
          sizePx: 22,
          showTickNumbers: true,
          lineColor: [1, 0.85, 0, 1],
          textColor: [1, 0.85, 0, 1],
        })
        nv.drawScene()
        status.textContent = `${length.toFixed(1)} u  (click to start over)`
        pointA = null
      })
    </script>
  </body>
</html>
