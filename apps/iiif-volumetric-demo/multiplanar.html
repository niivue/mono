<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Multiplanar streaming — niivue</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; height: 100%; background: #0b0c0e; color: #e8eaed; font: 13px/1.5 system-ui, sans-serif; }
      body { display: flex; flex-direction: column; }
      header { display: flex; align-items: center; gap: 12px; padding: 6px 12px; border-bottom: 1px solid #1f2227; flex: none; }
      header strong { font-weight: 600; }
      .links { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 12px; }
      .links a { color: #9aa0a6; text-decoration: none; }
      .controls { display: flex; align-items: center; gap: 10px; padding: 6px 12px; border-bottom: 1px solid #1f2227; flex: none; flex-wrap: wrap; }
      .controls label { color: #9aa0a6; }
      select, button { background: #16181c; color: #e8eaed; border: 1px solid #2a2d31; border-radius: 4px; padding: 3px 8px; font: inherit; }
      button { cursor: pointer; }
      button:hover { border-color: #3a3d41; }
      .sliders { display: flex; align-items: center; gap: 10px; padding: 6px 12px; border-bottom: 1px solid #1f2227; flex: none; flex-wrap: wrap; font-size: 12px; }
      .sliders label { color: #9aa0a6; }
      input[type="range"] { accent-color: #8ab4f8; vertical-align: middle; }
      main { position: relative; flex: 1; min-height: 0; background: #000; }
      canvas { width: 100%; height: 100%; display: block; }
      .hud { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.6); padding: 6px 9px; border-radius: 5px; font-size: 11px; white-space: pre; pointer-events: none; max-width: 52ch; }
      .hint { position: absolute; bottom: 8px; left: 8px; background: rgba(0,0,0,0.55); padding: 5px 9px; border-radius: 5px; font-size: 11px; color: #9aa0a6; }
      .fallback { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; text-align: center; padding: 24px; color: #f28b82; }
      fieldset { border: 1px solid #2a2d31; border-radius: 5px; padding: 3px 9px; display: inline-flex; align-items: center; gap: 8px; }
      legend { color: #9aa0a6; padding: 0 4px; }
    </style>
  </head>
  <body>
    <header>
      <strong>Multiplanar streaming</strong>
      <span class="links" data-nav-links></span>
    </header>
    <div class="controls">
      <label for="volume">volume</label>
      <select id="volume"></select>
      <label for="layout">layout</label>
      <select id="layout">
        <option value="3">multiplanar (A/C/S + 3D)</option>
        <option value="4">3D render only</option>
      </select>
      <button id="reset" type="button">reset view</button>
      <span id="mag" style="color:#9aa0a6"></span>
    </div>
    <div class="sliders">
      <fieldset>
        <legend>clip plane</legend>
        <label><input type="checkbox" id="clipOn" /> on</label>
        <label>depth <input type="range" id="clipDepth" min="-0.9" max="0.9" step="0.02" value="0" /></label>
        <label>azim <input type="range" id="clipAzi" min="0" max="360" step="2" value="0" /></label>
        <label>elev <input type="range" id="clipElev" min="-90" max="90" step="2" value="0" /></label>
        <label><input type="checkbox" id="clipCutaway" /> cutaway</label>
      </fieldset>
    </div>
    <main>
      <canvas id="nv-canvas"></canvas>
      <div class="hud" id="hud">loading…</div>
      <div class="hint">multiplanar streams only the chunks each slice + the 3D frustum need · turning the clip plane on drops the blocks it hides from the fetch set</div>
      <div class="fallback" id="fallback"></div>
    </main>
    <script type="module" src="/src/multiplanar.ts"></script>
  </body>
</html>
